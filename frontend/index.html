<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <meta name="description" content="Cứu Truyện - Trang đọc truyện tranh thư giãn">
    <title>Cứu Truyện - Trang chủ</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <!-- SwiperJS CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <header class="cuutruyen-header sticky-top pt-3 pb-3 shadow-sm">
        <div class="container-fluid px-5">
            <div class="row align-items-center">
                <!-- Navigation Left -->
                <div class="col-5 d-flex align-items-center gap-4 header-links">
                    <!-- Genres dropdown removed -->
                    <a href="#" class="text-decoration-none fw-bold">ỦNG HỘ</a>
                    <a href="#" class="text-decoration-none fw-bold">DISCORD</a>
                    <a href="#" class="text-decoration-none fw-bold text-uppercase d-none d-lg-block">Hội kín</a>
                    <a href="dang-truyen.html" id="navUploadManga" class="text-decoration-none fw-bold d-none">ĐĂNG
                        TRUYỆN</a>
                    <a href="quan-ly-nhom.html" id="navManageGroup" class="text-decoration-none fw-bold d-none">QUẢN LÝ
                        NHÓM</a>
                    <a href="quan-ly-he-thong.html" id="navSystemAdmin" class="text-decoration-none fw-bold d-none">QUẢN
                        TRỊ</a>
                </div>

                <!-- Logo Center -->
                <div class="col-2 text-center">
                    <a href="index.html"
                        class="text-decoration-none text-dark fs-4 fw-bold cuutruyen-logo text-uppercase">
                        Cứu Truyện
                    </a>
                </div>

                <!-- Action Icons Right -->
                <div class="col-5 d-flex justify-content-end align-items-center gap-3">
                    <button id="btnSearchToggle" class="btn-circular btn-icon"><i
                            class="fa-solid fa-magnifying-glass"></i></button>

                    <!-- Guest View -->
                    <div id="headerGuestView" class="d-flex align-items-center gap-2">
                        <button class="btn btn-outline-secondary fw-bold rounded-pill px-3" data-bs-toggle="modal"
                            data-bs-target="#loginModal">Đăng nhập</button>
                        <button class="btn btn-dark fw-bold rounded-pill px-3" data-bs-toggle="modal"
                            data-bs-target="#registerModal">Đăng ký</button>
                    </div>

                    <!-- User View -->
                    <div id="headerUserView" class="d-none align-items-center gap-3">
                        <button class="btn-circular btn-icon"><i class="fa-regular fa-bell"></i></button>
                        <div class="dropdown">
                            <button class="btn-circular btn-user fw-bold border-0" type="button"
                                data-bs-toggle="dropdown" aria-expanded="false">
                                <span id="headerAvatarText">U</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2 rounded-3"
                                style="min-width: 220px;">
                                <li><a class="dropdown-item py-2 fw-medium" href="truyen-theo-doi.html">Truyện theo
                                        dõi</a></li>
                                <li><a class="dropdown-item py-2 fw-medium" href="truyen-da-doc.html">Truyện đã đọc</a>
                                </li>
                                <li><a class="dropdown-item py-2 fw-medium" href="vi.html">Ví của tôi</a></li>
                                <li><a class="dropdown-item py-2 fw-medium d-none" id="menuUploadManga"
                                        href="dang-truyen.html">Đăng truyện</a></li>
                                <li><a class="dropdown-item py-2 fw-medium" href="cai-dat.html">Cài đặt</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item py-2 text-danger fw-medium" id="btnLogout" href="#">Đăng
                                        xuất</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="py-4">
        <div class="container-fluid px-5 mx-auto" style="max-width: 1400px;">
            <section class="hero-carousel-section mb-5 position-relative">
                <div class="swiper heroSwiper rounded-4 overflow-hidden shadow-sm">
                    <div class="swiper-wrapper">
                        <!-- Slides injected by JS -->
                        <div class="swiper-slide">
                            <div class="hero-slide-content" style="height: 500px; background: #eee;"></div>
                        </div>
                    </div>
                    <div class="swiper-pagination"></div>
                </div>
            </section>

            <section class="recently-updated-section mb-5 position-relative">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold fs-5 text-uppercase text-secondary section-title">MỚI CẬP NHẬT</h4>
                </div>
                <div class="swiper updatedSwiper pb-2">
                    <div class="swiper-wrapper" id="updatedMangaList">
                        <!-- Manga cards injected by JS -->
                    </div>
                    <div class="swiper-button-next text-secondary custom-swiper-nav shadow-sm bg-light rounded-circle">
                    </div>
                </div>
                <div class="d-flex justify-content-end mt-3">
                    <a href="truyen-moi.html" class="text-secondary fw-bold text-decoration-none"
                        style="font-size: 0.9rem;">
                        TẤT CẢ TRUYỆN <i class="fa-solid fa-chevron-right ms-1" style="font-size: 0.8rem;"></i>
                    </a>
                </div>
            </section>
        </div>
    </main>

    <!-- Search Overlay -->
    <div id="searchOverlay" class="search-overlay d-none">
        <div class="search-overlay-content container mx-auto" style="max-width: 800px; padding-top: 100px;">
            <div class="position-relative">
                <input type="text" id="liveSearchInput"
                    class="form-control form-control-lg py-3 px-4 rounded-3 shadow-sm" placeholder="Tìm kiếm...">
            </div>
        </div>
        <button id="closeSearchBtn" class="btn text-secondary position-absolute top-0 end-0 m-4 fs-2 border-0"><i
                class="fa-solid fa-xmark"></i></button>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const heroWrapper = document.querySelector('.heroSwiper .swiper-wrapper');
            const updatedWrapper = document.querySelector('.updatedSwiper .swiper-wrapper');

            try {
                const mangas = await ApiService.getMangas();

                // Banner
                const bannerMangas = mangas.slice(0, 3);
                heroWrapper.innerHTML = bannerMangas.map(m => `
                    <div class="swiper-slide">
                        <div class="hero-slide-content position-relative" style="background-image: url('${getImageUrl(m.coverUrl) || 'https://placehold.co/1400x500'}');">
                            <div class="hero-overlay"></div>
                            <div class="hero-info position-absolute bottom-0 start-0 p-5 text-white w-100">
                                <h2 class="fw-bold mb-3 fs-3">${m.title}</h2>
                                <p class="mb-4 text-white-50 lh-lg" style="max-width: 70%">${m.description || ''}</p>
                                <button class="btn btn-warning px-4 py-2 fw-bold" onclick="window.location.href='chi-tiet-truyen.html?id=${m.seriesId}'">XEM THÔNG TIN</button>
                            </div>
                        </div>
                    </div>
                `).join('');

                // Updated
                updatedWrapper.innerHTML = mangas.map(m => `
                    <div class="swiper-slide">
                        <div class="manga-card h-100">
                            <div class="card border-0 bg-transparent h-100">
                                <div class="manga-cover rounded-3 overflow-hidden shadow-sm mb-2" style="aspect-ratio: 3/4">
                                    <a href="chi-tiet-truyen.html?id=${m.seriesId}">
                                        <img src="${getImageUrl(m.coverUrl)}" class="w-100 h-100 object-fit-cover" loading="lazy">
                                    </a>
                                </div>
                                <h6 class="fw-bold text-truncate mb-1"><a href="chi-tiet-truyen.html?id=${m.seriesId}" class="text-dark text-decoration-none">${m.title}</a></h6>
                            </div>
                        </div>
                    </div>
                `).join('');

                initSwipers();
            } catch (err) {
                console.error("Home load error:", err);
            }
        });
    </script>
</body>

</html>
