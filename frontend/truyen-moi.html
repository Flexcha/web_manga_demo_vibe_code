    <!-- Main Content -->
    <main class="py-5">
        <div class="container-fluid px-5 mx-auto" style="max-width: 1400px;">

            <!-- Truyen Moi Section (Lưới 5 cột x 6 hàng = 30 Card) -->
            <section class="recently-updated-section mb-5 position-relative">
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <h4 class="fw-bold fs-5 text-uppercase text-secondary section-title">TẤT CẢ TRUYỆN MỚI</h4>
                </div>

                <!-- Lưới 5 cột mỗi hàng `row-cols-5` -->
                <div class="row row-cols-5 g-4 pb-5" id="mangaList">
                    <!-- Nội dung sinh ra bằng Javascript -->
                </div>

                <!-- Phân trang -->
                <div class="d-flex justify-content-center mt-2 border-top pt-4">
                    <button class="btn btn-light fw-bold text-secondary px-4 me-3 border shadow-sm" id="prevPageBtn" disabled><i class="fa-solid fa-chevron-left me-2"></i> Trang sau</button>
                    <!-- Wait, if prevailing standard is 'Trang trước' is Left and 'Trang sau' is right -->
                    <button class="btn btn-light fw-bold text-dark px-4 border shadow-sm" id="nextPageBtn">Trang tiếp theo <i class="fa-solid fa-chevron-right ms-2"></i></button>
                </div>

                <script>
                    let currentPage = 1;
                    function renderMangas(page) {
                        const container = document.getElementById('mangaList');
                        let html = '';
                        const startIdx = (page - 1) * 30 + 1;
                        const endIdx = page * 30;
                        
                        for (let i = startIdx; i <= endIdx; i++) {
                            const fakeDate = "03/04/2026 " + String((i % 12) + 1).padStart(2, '0') + ":00";
                            html += `
                            <div class="col">
                                <div class="manga-card h-100">
                                    <div class="card border-0 bg-transparent h-100">
                                        <div class="manga-cover rounded-3 overflow-hidden position-relative shadow-sm mb-2">
                                            <a href="chi-tiet-truyen.html" class="d-block w-100 h-100">
                                                <img src="https://placehold.co/300x420/e0e0e0/616161?text=Truyen+` + i + `"
                                                    alt="Manga Cover" class="w-100 h-100 object-fit-cover">
                                            </a>
                                            <span class="badge position-absolute top-0 start-0 m-2 rounded-pill chapter-badge">C.` + i + `</span>
                                        </div>
                                        <div class="card-body p-0 mt-2">
                                            <h6 class="card-title fw-bold text-truncate mb-1">
                                                <a href="chi-tiet-truyen.html" class="text-dark text-decoration-none">Mới cập nhật `+ i +`</a>
                                            </h6>
                                            <p class="card-text small text-muted font-monospace fw-bold mb-0" style="font-size: 0.75rem;">C. ` + i + ` - ` + fakeDate + `</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            `;
                        }
                        container.innerHTML = html;
                        
                        document.getElementById('prevPageBtn').disabled = (page === 1);
                        document.getElementById('prevPageBtn').innerHTML = '<i class="fa-solid fa-chevron-left me-2"></i> Trang trước';
                        document.getElementById('nextPageBtn').innerHTML = 'Trang sau <i class="fa-solid fa-chevron-right ms-2"></i>';
                    }

                    document.getElementById('nextPageBtn').addEventListener('click', function() {
                        currentPage++;
                        renderMangas(currentPage);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });

                    document.getElementById('prevPageBtn').addEventListener('click', function() {
                        if (currentPage > 1) {
                            currentPage--;
                            renderMangas(currentPage);
                            window.scrollTo({ top: 0, behavior: 'smooth' });
                        }
                    });

                    // Khởi tạo trang đầug
                    renderMangas(currentPage);
                </script>

            </section>
        </div>
